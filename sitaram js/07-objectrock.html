<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
      playGame('rock');
    ">Rock</button>

  <button onclick="
      playGame('paper');
    ">Paper</button>

  <button onclick="
      playGame('scissors');
    ">Scissors</button>
  <button onclick="resetScore()">Reset</button>
  <script>
    const score = {
      Win: 0,
      Loss: 0,
      Tie: 0
    };
    function playGame(playerMove) {
      const computerMove = pickComputerMove();

      let result = '';
      if (playerMove === 'scissors') {
        if (computerMove === 'rock') {
          result = 'You lose.';
        } else if (computerMove === 'paper') {
          result = 'You win.';
        } else if (computerMove === 'scissors') {
          result = 'Tie.';
        }

      } else if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win.';
        } else if (computerMove === 'paper') {
          result = 'Tie.';
        } else if (computerMove === 'scissors') {
          result = 'You lose.';
        }

      } else if (playerMove === 'rock') {
        if (computerMove === 'rock') {
          result = 'Tie.';
        } else if (computerMove === 'paper') {
          result = 'You lose.';
      } else if (computerMove === 'scissors') {
          result = 'You win.';
        }
      }
      // object creation.
      if (result === 'You win.') {
        score.Win += 1;
      } else if (result === 'You lose.') {
        score.Loss += 1;
      } else if (result === 'Tie.') {
        score.Tie += 1;
      }

      alert(`You picked ${playerMove}. Computer picked ${computerMove}. ${result} Win : ${score.Win} Loss : ${score.Loss} Tie : ${score.Tie} , Score Reset! Win: ${score.Win} Loss: ${score.Loss} Tie: ${score.Tie}`);
    }
    function resetScore() {
      score.Win = 0;
      score.Loss = 0;
      score.Tie = 0;

      console.log(score); // shows {Win: 0, Loss: 0, Tie: 0}

    }
    function pickComputerMove() {
      const randomNumber = Math.random();

      let computerMove = '';

      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = 'rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computerMove = 'scissors';
      }
      return computerMove;
    }
  </script>
</body>

</html>
