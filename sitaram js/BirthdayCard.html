<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
}

/* Header */
.header {
    background-color: #c84086;
    color: white;
    padding: 25px;
    font-size: 34px;
    text-align: center;
    letter-spacing: 2px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* Layout */
.main {
    display: flex;
    height: calc(100vh - 80px);
}

/* Left */
.leftSide {
    width: 25%;
    background: #6a5acd;
    color: white;
    padding: 20px;
    text-align: center;
}

/* Center Card */
.one {
    width: 50%;
    background: white;
    border-radius: 15px;
    margin: 20px;
    padding: 20px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.4s;
}

.one:hover {
    transform: scale(1.05);
}


.rightSide {
    width: 25%;
    background: #6a5acd;
}


#name {
    cursor: pointer;
    margin-top: 10px;
    transition: 0.3s;
}

#name:hover {
    transform: scale(1.2);
}


#wish {
    margin-top: 20px;
    font-size: 16px;
}


button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #ff4081;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: black;
    transform: scale(1.1);
}


.cake img {
    width: 300px;
    margin-top: 20px;
}

.photo {
    margin-top: 20px;
}

.photo img {
    width: 200px;
    object-fit: contain;
}
</style>
</head>

<body>

<header class="header">🎉 HAPPY BIRTHDAY 🎉</header>

<div class="main">

    <div class="leftSide">
        <h2>Happy Birthday 🎂</h2>

        <h2 id="name" onclick="changeName()">Name</h2>

        <h3 id="wish">
        Happy Birthday! 🎉🎂 <br>
        May your life be filled with happiness, success, and endless smiles 😊 <br>
        Enjoy your special day 💖✨
        </h3>

        <button onclick="changeWishes()">Change Wishes</button>
    </div>

    <div class="one">
        <div class="cake">
            <img src="https://www.freepnglogos.com/uploads/happy-birthday-png/clipart-happy-birthday-download-best-14.png">
        </div>

        <div class="photo">
            <img src="https://png.pngtree.com/png-clipart/20230914/original/pngtree-birthday-cake-dessert-pink-three-dimensional-png-image_12164412.png">
        </div>
    </div>

    <div class="leftSide">
        <h2>Happy Birthday 🎂</h2>

        <h2 id="name" onclick="changeName()">Name</h2>

        <h3 id="wish">
        Happy Birthday! 🎉🎂 <br>
        May your life be filled with happiness, success, and endless smiles 😊 <br>
        Enjoy your special day 💖✨
        </h3>

        <button onclick="changeWishes()">Change Wishes</button>
    </div>


</div>


<script>
   function changeName(){
    let username = prompt('change name');
 document.getElementById("name").innerText = username || " Name"; 
   
    document.getElementById("name").style.color = "pink";
}

function changeWishes() {
    let userwish = prompt('change wishes');
 document.getElementById("wish").innerText = userwish || " Name";

    document.getElementById("wish").style.color = "yellow";
    
}
</script>

</body>
</html>
