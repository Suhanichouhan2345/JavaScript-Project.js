<!DOCTYPE html>
<html>
<head>
  <title>Rock Paper Scissors</title>
</head>
<style>
  body{
    background-color: black;
    color:white;
    font-family: Arial, Helvetica, sans-serif;
     font-size: 20px;
    font-weight: bold;
    margin-left: 50px;
  }
  .tittle{
    display: flex;
    font-size: 30px;
    font-weight: bold;
  }
  .move-button{
  background-color: transparent;
  border: none;
    border: 3px solid white;
   margin: 10px;
   border-radius: 60%;
   padding: 30px;
}
.move-icons{
  height: 120px;
  width: 120px;
}
.score{
  margin-top: 60px;
}
.reset, 
.autoPlay{
  padding:  8px 25px;
  background-color: white;
  border: none;
  font-size: 25px;
  cursor: pointer;

}
</style>
<body>
  <p class="tittle">Rock Paper Scissors</p>

<button onclick="playGame('rock');" class="move-button">
  <img src="images/rock-emoji.png" class="move-icons">
</button>

<button onclick="playGame('paper');" class="move-button"> 
  <img src="images/paper-emoji.png" class="move-icons">
</button>

<button onclick="playGame('scissors');" class="move-button"> 
  <img src="images/scissors-emoji.png" class="move-icons">
</button>
     <!-- DOM -->

 <p class="js-result"></p>
 <p class="js-moves"></p>
<p class="js-Score score"></p>


<button onclick="resetScore(); updateScore();" class="reset">Reset</button>

<button class="autoPlay" onclick="autoFunction()">Auto Play</button>

  <script>
  const score = JSON.parse(localStorage.getItem('score')) || {
  Win: 0,
  Loss: 0,
  Tie: 0
};
 
 let isAutoPlaying = false;
let interval;

function autoFunction() {
  if (!isAutoPlaying) {
    interval = setInterval(function () {
      const playerMove = pickComputerMove();
      playGame(playerMove);
    }, 1000);

    isAutoPlaying = true;
  } else {
    clearInterval(interval);
    isAutoPlaying = false;
  }
}
   //DOM
    updateScore();

    function playGame(playerMove) {
      const computerMove = pickComputerMove();

      let result = '';
      if (playerMove === 'scissors') {
        if (computerMove === 'rock') {
          result = 'You lose.';
        } else if (computerMove === 'paper') {
          result = 'You win.';
        } else if (computerMove === 'scissors') {
          result = 'Tie.';
        }
      
      }  else if (playerMove === 'paper') {
        if (computerMove === 'rock') {
          result = 'You win.';
        } else if (computerMove === 'paper') {
          result = 'Tie.';
        } else if (computerMove === 'scissors') {
          result = 'You lose.';
        }

      } else if (playerMove === 'rock') {
        if (computerMove === 'rock') {
          result = 'Tie.';
        } else if (computerMove === 'paper') {
          result = 'You lose.';
      } else if (computerMove === 'scissors') {
          result = 'You win.';
        }
      }

      // object creation.
      if (result === 'You win.') {
        score.Win += 1;
      } else if (result === 'You lose.') {
        score.Loss += 1;
      } else if (result === 'Tie.') {
        score.Tie += 1;
      }
    // local storage
       localStorage.setItem('score',JSON.stringify(score));

       //DOM call
   updateScore();
document.querySelector('.js-result').innerHTML =result;

document.querySelector('.js-moves').innerHTML =` You <img src="images/${playerMove}-emoji.png"class="move-icons">
  <img src="images/${computerMove}-emoji.png"class="move-icons">
  Computer.`;
         
    }
     // dom
      function updateScore(){
        document.querySelector('.js-Score').innerHTML = `Score! Win: ${score.Win} Loss: ${score.Loss} Tie: ${score.Tie}`;
        }
       
    function resetScore() {
      score.Win = 0;
      score.Loss = 0;
      score.Tie = 0;
       localStorage.removeItem('score');
      console.log(score); // shows {Win: 0, Loss: 0, Tie: 0}

    }
    function pickComputerMove() {
      const randomNumber = Math.random();

      let computerMove = '';

      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = 'rock';
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = 'paper';
      } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computerMove = 'scissors';
      }
      return computerMove;
    }
  </script>
</body>

</html>
