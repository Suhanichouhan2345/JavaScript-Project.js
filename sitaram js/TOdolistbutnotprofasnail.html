<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    <p> TodoList </p>
    <input placeholder="Todo List" class="inpute">
    <button onclick="todolist()">add</button>
    <p class="main"></p>

    <script>
        const arr = [];
        function todolist(){
            const value = document.querySelector('.inpute');
            const name = value.value;
            arr.push(name);
             const val = document.querySelector('.main').innerHTML = arr.join("<br>");  ;
            value.value = ' ';
        }

        
    </script>
</body>
</html>
