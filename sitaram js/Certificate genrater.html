<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate</title>
</head>

 <style>
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: linear-gradient(135deg, #e3f2fd, #f5f5f5);
    font-family: 'Segoe UI', sans-serif;
}


.container h1 {
    margin-top: 20px;
    color: #333;
}

.form-box {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
}



button:hover {
    transform: scale(1.05);
    opacity: 0.9;
    color: #c0392b;
    background-color: #f5f5f5;
}


.main {
    width: 90%;
    max-width: 900px;
    background: #fff;
    border: 12px solid gold;
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.main1 {
    border: 3px dashed #444;
    padding: 25px;
    text-align: center;
}


.main2 {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
}

.main2 img {
    width: 80px;
}

h1 {
    font-size: 32px;
    color: #2c3e50;
    margin-top: 15px;
}

.name {
    font-size: 30px;
    font-weight: bold;
    color: #c0392b;
    margin: 10px 0;
}


.course-name {
    font-size: 24px;
    color: #16a085;
    font-weight: bold;
}

.date {
    margin-top: 20px;
    font-style: italic;
}


.signature {
    margin-top: 40px;
}

.signature-line {
    width: 200px;
    height: 2px;
    background: black;
    margin: 0 auto;
}

.signature-text {
    margin-top: 5px;
}

 </style>
 <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <body>
    
 <div class="container">
      <h1>🎓 Certificate Generator</h1>
 <div class="box">
      <div class="form-box">
      <input type="text" id="name" placeholder="Enter Name">
<input type="text" id="course" placeholder="Enter Course">

<button onclick="genreateCretificate()">Generate Certificate</button>
         <button class="pdf-btn" onclick=" pdff()">Download PDF</button>
        <button class="whatsapp-btn" onclick="shareWhatsApp()">WhatsApp Share</button>
     </div>
 </div>







 <div class="main" id="certificate">
    <div class="main1">
        <div class="main2">
             <img src="https://tse4.mm.bing.net/th/id/OIP.ogABt8Fug3MBJfHCbX1WvQHaHa?pid=Api&P=0&h=180">
             <h2>Sagar Institute of Science and Technology</h2>  </div>

             <h1>Certificate of Appreciation</h1>

               <p>This certificate is proudly presented to</p>

               <div class="name" id="Studentname"> Your Name</div>

               <p>For successfully completing</p>

                <div class="course-name" id="coursename">Web Development Course</div>

                 <div class="date" id="date">Date: --/--/----</div>

                 <div class="signature">
                    <div class="signature-line">
                    </div>
                    <div class="signeature-text">Authorized signature</div>
                 </div>
    
    </div>
 </div>
           
 <script>
   
    function genreateCretificate(){
        let name = document.getElementById("name").value.trim();
        let course = document.getElementById("course").value.trim();
        let Today = new Date().toLocaleDateString();

        document.getElementById("Studentname").innerText = name || "Student Name";
        document.getElementById("coursename").innerText = course || "Course Name";
        document.getElementById("date").innerText = "Date : " + Today;
     } 

     async function pdff() {
    const { jsPDF } = window.jspdf;

    const certificate = document.getElementById("certificate");

    const canvas = await html2canvas(certificate, {
        scale: 2
    });

    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("landscape", "pt", "a4");

    const pdfWidth = pdf.internal.pageSize.getWidth();
    const pdfHeight = pdf.internal.pageSize.getHeight();

    pdf.addImage(imgData, "PNG", 20, 20, pdfWidth - 40, pdfHeight - 40);

    pdf.save("certificate.pdf");
}
     function shareWhatsApp() {
      let name = document.getElementById("name").value.trim() || "Student";
      let course = document.getElementById("course").value.trim() || "Course";

      let message = `🎓 Certificate Ready!\n\nName: ${name}\nCourse: ${course}\n\nAapka certificate generate ho gaya hai.`;
      let url = `https://wa.me/?text=${encodeURIComponent(message)}`;

      window.open(url, "_blank");
    }
     </script>
 
</body>
</html>
